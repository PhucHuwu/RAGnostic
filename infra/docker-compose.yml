services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ragnostic-postgres
    environment:
      POSTGRES_DB: ragnostic
      POSTGRES_USER: ragnostic
      POSTGRES_PASSWORD: ragnostic
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    container_name: ragnostic-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: ragnostic-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
